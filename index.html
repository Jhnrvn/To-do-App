<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-do List</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>My To-do List</h1>
    </header>
    <main>
      <div class="container">
        <!-- add task form -->
        <form id="task-form">
          <div class="form-group">
            <input type="text" id="task-input" class="task-input" placeholder="Enter you Task" />
            <button type="submit" id="add-task-btn" class="add-task-btn">Add Task</button>
          </div>
        </form>
        <h2 id="task-header-text">Tasks List</h2>
        <div class="task-list-container" id="task-list-container"></div>
        <!-- <p class="task-count" id="task-count-text">You have <span id="task-count-span">0</span> tasks</p> -->
        <p class="task-count" id="task-count-text">You don't have any tasks</p>
      </div>
    </main>
    <footer>
      <p id="copyright"></p>
      <script>
        const currentYear = new Date().getFullYear();
        document.getElementById("copyright").innerHTML = `&copy; ${currentYear} Jhnrvn. All rights reserved.`;
      </script>
    </footer>
    <!-- font awesome -->
    <script src="https://kit.fontawesome.com/23c655eb58.js" crossorigin="anonymous"></script>
    <!-- main script -->
    <script src="script.js"></script>
  </body>
</html>
